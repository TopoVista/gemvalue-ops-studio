<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GemValue Ops Studio - Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            padding: 28px;
            background: #f6f9fb;
            color: #17202a;
        }

        .shell {
            width: min(980px, 100%);
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 18px;
            margin-bottom: 22px;
        }

        .eyebrow {
            color: #2d6a6a;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        h1 {
            margin-top: 6px;
            font-size: clamp(1.9rem, 5vw, 3rem);
            line-height: 1.05;
        }

        .back-link {
            color: #1b6f73;
            text-decoration: none;
            font-weight: 700;
        }

        .form-container {
            background: #fff;
            border: 1px solid #d9e5e7;
            border-radius: 8px;
            padding: 26px;
            box-shadow: 0 18px 45px rgba(39, 65, 72, 0.1);
        }

        form {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        label {
            color: #354650;
            font-size: 0.9rem;
            font-weight: 700;
        }

        input[type="text"],
        select {
            min-height: 44px;
            padding: 10px 12px;
            border: 1px solid #bfd4d7;
            border-radius: 7px;
            color: #17202a;
            background: #fbfdfd;
        }

        input[type="text"]:focus,
        select:focus {
            border-color: #1b6f73;
            outline: 3px solid rgba(27, 111, 115, 0.14);
        }

        .submit-row {
            grid-column: 1 / -1;
            display: flex;
            justify-content: flex-end;
            margin-top: 4px;
        }

        input[type="submit"] {
            min-height: 46px;
            padding: 0 22px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            background: #1b6f73;
            font-size: 1rem;
            font-weight: 700;
        }

        .error {
            grid-column: 1 / -1;
            padding: 12px 14px;
            border-radius: 8px;
            background: #fff2f0;
            color: #9f2a1d;
            border: 1px solid #f2c3bd;
        }

        @media (max-width: 760px) {
            header {
                align-items: flex-start;
                flex-direction: column;
            }

            form {
                grid-template-columns: 1fr;
            }

            .submit-row {
                justify-content: stretch;
            }

            input[type="submit"] {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <header>
            <div>
                <div class="eyebrow">GemValue Ops Studio</div>
                <h1>Gemstone price predictor</h1>
            </div>
            <a class="back-link" href="/">Dashboard</a>
        </header>

        <section class="form-container">
            <form action="{{url_for('predict_datapoint')}}" method="post">
                {% if error %}
                <div class="error">{{ error }}</div>
                {% endif %}

                <div class="form-group">
                    <label for="carat">Carat</label>
                    <input type="text" id="carat" name="carat" placeholder="0.50" required>
                </div>

                <div class="form-group">
                    <label for="depth">Depth</label>
                    <input type="text" id="depth" name="depth" placeholder="60.5" required>
                </div>

                <div class="form-group">
                    <label for="table">Table</label>
                    <input type="text" id="table" name="table" placeholder="55.0" required>
                </div>

                <div class="form-group">
                    <label for="x">X dimension</label>
                    <input type="text" id="x" name="x" placeholder="5.0" required>
                </div>

                <div class="form-group">
                    <label for="y">Y dimension</label>
                    <input type="text" id="y" name="y" placeholder="5.0" required>
                </div>

                <div class="form-group">
                    <label for="z">Z dimension</label>
                    <input type="text" id="z" name="z" placeholder="3.0" required>
                </div>

                <div class="form-group">
                    <label for="cut">Cut</label>
                    <select id="cut" name="cut" required>
                        <option value="Fair">Fair</option>
                        <option value="Good">Good</option>
                        <option value="Very Good">Very Good</option>
                        <option value="Premium">Premium</option>
                        <option value="Ideal">Ideal</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="color">Color</label>
                    <select id="color" name="color" required>
                        <option value="D">D</option>
                        <option value="E">E</option>
                        <option value="F">F</option>
                        <option value="G">G</option>
                        <option value="H">H</option>
                        <option value="I">I</option>
                        <option value="J">J</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="clarity">Clarity</label>
                    <select id="clarity" name="clarity" required>
                        <option value="I1">I1</option>
                        <option value="SI2">SI2</option>
                        <option value="SI1">SI1</option>
                        <option value="VS2">VS2</option>
                        <option value="VS1">VS1</option>
                        <option value="VVS2">VVS2</option>
                        <option value="VVS1">VVS1</option>
                        <option value="IF">IF</option>
                    </select>
                </div>

                <div class="submit-row">
                    <input type="submit" value="Predict price">
                </div>
            </form>
        </section>
    </main>
</body>
</html>
